name: Validate Store PR

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      source_repository:
        description: Repository that triggered this CI.
        required: false
      source_sha:
        description: Commit SHA that triggered this CI.
        required: false
      source_run_id:
        description: GitHub Actions run ID that triggered this CI.
        required: false
      source_run_url:
        description: GitHub Actions run URL that triggered this CI.
        required: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate catalog and policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate PR
        run: npm run ci:pr
